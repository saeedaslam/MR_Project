<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Info</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a26;
    --bg-card-hover: #222233;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --red: #e53e3e;
    --red-dark: #c53030;
    --red-glow: rgba(229, 62, 62, 0.15);
    --red-glow-strong: rgba(229, 62, 62, 0.3);
    --green: #38a169;
    --green-glow: rgba(56, 161, 105, 0.15);
    --border: #2a2a3a;
    --border-light: #33334a;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .phone-frame {
    width: 100%;
    max-width: 400px;
    background-color: var(--bg-primary);
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 20px 16px;
  }

  .top-bar-left h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .top-bar-left p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
  }

  .logout-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-glow);
  }

  /* ===== CARD SECTION ===== */
  .card-section {
    padding: 8px 20px 24px;
  }

  .card-visual {
    width: 100%;
    aspect-ratio: 1.6 / 1;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 24px;
    transition: all 0.4s ease;
  }

  .card-visual.expired {
    background: linear-gradient(135deg, #2d1010 0%, #1a0808 40%, #2d1010 100%);
    border: 1.5px solid var(--red);
    box-shadow: 0 0 30px var(--red-glow), 0 4px 20px rgba(0,0,0,0.4);
  }

  .card-visual.active {
    background: linear-gradient(135deg, #1a2636 0%, #0f1a28 40%, #1a2636 100%);
    border: 1.5px solid var(--border-light);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .card-pattern {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    opacity: 0.04;
    background-image: 
      radial-gradient(circle at 20% 50%, white 1px, transparent 1px),
      radial-gradient(circle at 80% 20%, white 1px, transparent 1px),
      radial-gradient(circle at 60% 80%, white 1px, transparent 1px);
    background-size: 30px 30px, 40px 40px, 25px 25px;
  }

  .card-chip {
    width: 40px;
    height: 30px;
    border-radius: 6px;
    position: relative;
    z-index: 1;
  }

  .card-visual.expired .card-chip {
    background: linear-gradient(135deg, #4a2020, #3a1515);
    border: 1px solid rgba(229, 62, 62, 0.3);
  }

  .card-visual.active .card-chip {
    background: linear-gradient(135deg, #3a4a5a, #2a3a4a);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .card-chip::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 4px;
    right: 4px;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  .card-bottom {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
  }

  .card-brand {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ===== EXPIRY BADGE ===== */
  .expiry-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 16px;
    transition: all 0.3s ease;
  }

  .expiry-badge.expired {
    background: var(--red-glow-strong);
    color: var(--red);
    border: 1px solid rgba(229, 62, 62, 0.4);
    animation: pulse-red 2s ease-in-out infinite;
  }

  .expiry-badge.active {
    background: var(--green-glow);
    color: var(--green);
    border: 1px solid rgba(56, 161, 105, 0.3);
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.2); }
    50% { box-shadow: 0 0 0 8px rgba(229, 62, 62, 0); }
  }

  .expiry-badge i {
    font-size: 11px;
  }

  /* ===== NAME ===== */
  .name-section {
    padding: 0 20px 20px;
  }

  .customer-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.03em;
    line-height: 1.2;
  }

  /* ===== DETAILS ===== */
  .details-section {
    padding: 0 20px 16px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .detail-row:last-child {
    border-bottom: none;
  }

  .detail-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .detail-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }

  .detail-value.expired-text {
    color: var(--red);
  }

  /* ===== BALANCE ===== */
  .balance-section {
    padding: 0 20px 16px;
  }

  .balance-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s ease;
  }

  .balance-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .balance-amount {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 4px;
  }

  .balance-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 16px;
  }

  /* ===== OTHER DETAILS ===== */
  .other-details-section {
    padding: 0 20px 24px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }

  .no-details {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    padding: 8px 0;
  }

  /* ===== ACTION BUTTON ===== */
  .action-section {
    padding: 0 20px 32px;
  }

  .action-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .action-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.5s ease;
  }

  .action-btn:hover::before {
    left: 100%;
  }

  /* RED EXPIRED BUTTON */
  .action-btn.expired-btn {
    background: linear-gradient(135deg, #e53e3e 0%, #c53030 50%, #9b2c2c 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(229, 62, 62, 0.35), 0 0 40px rgba(229, 62, 62, 0.1);
    animation: btn-glow-red 2.5s ease-in-out infinite;
  }

  .action-btn.expired-btn:hover {
    background: linear-gradient(135deg, #fc5252 0%, #e53e3e 50%, #c53030 100%);
    box-shadow: 0 6px 30px rgba(229, 62, 62, 0.5), 0 0 60px rgba(229, 62, 62, 0.15);
    transform: translateY(-1px);
  }

  .action-btn.expired-btn:active {
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(229, 62, 62, 0.3);
  }

  @keyframes btn-glow-red {
    0%, 100% { box-shadow: 0 4px 20px rgba(229, 62, 62, 0.35), 0 0 40px rgba(229, 62, 62, 0.1); }
    50% { box-shadow: 0 4px 25px rgba(229, 62, 62, 0.5), 0 0 60px rgba(229, 62, 62, 0.2); }
  }

  /* GREEN ACTIVE BUTTON */
  .action-btn.active-btn {
    background: linear-gradient(135deg, #38a169 0%, #2f855a 50%, #276749 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(56, 161, 105, 0.25);
  }

  .action-btn.active-btn:hover {
    background: linear-gradient(135deg, #48bb78 0%, #38a169 50%, #2f855a 100%);
    box-shadow: 0 6px 30px rgba(56, 161, 105, 0.35);
    transform: translateY(-1px);
  }

  .action-btn.active-btn:active {
    transform: translateY(1px);
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .toast.red {
    border-color: rgba(229, 62, 62, 0.4);
    background: linear-gradient(135deg, #1a1010, #1a1a26);
  }

  .toast.red i {
    color: var(--red);
  }

  .toast.green i {
    color: var(--green);
  }

  /* ===== DEMO TOGGLE ===== */
  .demo-toggle {
    padding: 0 20px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .toggle-label {
    font-size: 11px;
    color: var(--text-muted);
  }

  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
    cursor: pointer;
  }

  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: all 0.3s ease;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text-muted);
    top: 2px;
    left: 2px;
    transition: all 0.3s ease;
  }

  .toggle-switch input:checked + .toggle-slider {
    background: var(--red-glow-strong);
    border-color: rgba(229, 62, 62, 0.4);
  }

  .toggle-switch input:checked + .toggle-slider::before {
    background: var(--red);
    transform: translateX(20px);
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .demo-label-text {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    padding-bottom: 4px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <h1 id="accountTitle">Account 03034005269</h1>
      <p>Customer Portal</p>
    </div>
    <button class="logout-btn" onclick="showToast('Logged out successfully', 'green')">
      <i class="fas fa-sign-out-alt" style="margin-right:4px;font-size:11px;"></i> Log out
    </button>
  </div>

  <!-- Card Visual -->
  <div class="card-section">
    <div class="card-visual" id="cardVisual">
      <div class="card-pattern"></div>
      <div class="card-chip"></div>
      <div class="card-bottom">
        <div class="card-brand">CARD</div>
      </div>
    </div>
    <div class="expiry-badge" id="expiryBadge">
      <i class="fas fa-clock"></i>
      <span id="expiryBadgeText">Expires 02 Jun 2026</span>
    </div>
  </div>

  <!-- Customer Name -->
  <div class="name-section">
    <div class="customer-name">Muhammd Bilal Rafiq</div>
  </div>

  <!-- Details -->
  <div class="details-section">
    <div class="detail-row">
      <span class="detail-label">Customer ID</span>
      <span class="detail-value">pnmr0152</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Phone</span>
      <span class="detail-value">03034005269</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Expires</span>
      <span class="detail-value" id="expiryValue">02 Jun 2026</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="detail-value" id="statusValue">Active</span>
    </div>
  </div>

  <!-- Balance -->
  <div class="balance-section">
    <div class="balance-card">
      <div>
        <div class="balance-label">Balance</div>
        <div class="balance-amount">Rs. 0.00</div>
      </div>
      <div class="balance-icon">
        <i class="fas fa-minus"></i>
      </div>
    </div>
  </div>

  <!-- Other Details -->
  <div class="other-details-section">
    <div class="section-title">Other Details</div>
    <div class="no-details">No other details on file.</div>
  </div>

  <!-- Action Button -->
  <div class="action-section">
    <button class="action-btn" id="actionBtn" onclick="handleAction()">
      <i class="fas fa-shield-halved"></i>
      <span id="actionBtnText">Account is Active</span>
    </button>
  </div>

  <!-- Demo Toggle -->
  <div class="demo-label-text">Demo: Toggle Expiry Status</div>
  <div class="demo-toggle">
    <span class="toggle-label">Active</span>
    <label class="toggle-switch">
      <input type="checkbox" id="expiryToggle" onchange="toggleExpiry()">
      <span class="toggle-slider"></span>
    </label>
    <span class="toggle-label">Expired</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <i class="fas fa-info-circle"></i>
  <span id="toastText"></span>
</div>

<script>
  const EXPIRY_DATE = new Date('2026-06-02T23:59:59');

  function isExpired() {
    return new Date() > EXPIRY_DATE;
  }

  function updateUI(expired) {
    const cardVisual = document.getElementById('cardVisual');
    const expiryBadge = document.getElementById('expiryBadge');
    const expiryBadgeText = document.getElementById('expiryBadgeText');
    const expiryValue = document.getElementById('expiryValue');
    const statusValue = document.getElementById('statusValue');
    const actionBtn = document.getElementById('actionBtn');
    const actionBtnText = document.getElementById('actionBtnText');

    if (expired) {
      cardVisual.className = 'card-visual expired';

      expiryBadge.className = 'expiry-badge expired';
      expiryBadgeText.textContent = 'Expired — 02 Jun 2026';

      expiryValue.className = 'detail-value expired-text';

      statusValue.textContent = 'Expired';
      statusValue.className = 'detail-value expired-text';

      actionBtn.className = 'action-btn expired-btn';
      actionBtn.querySelector('i').className = 'fas fa-exclamation-triangle';
      actionBtnText.textContent = 'Account Expired — Renew Now';
    } else {
      cardVisual.className = 'card-visual active';

      expiryBadge.className = 'expiry-badge active';
      expiryBadgeText.textContent = 'Expires 02 Jun 2026';

      expiryValue.className = 'detail-value';

      statusValue.textContent = 'Active';
      statusValue.className = 'detail-value';

      actionBtn.className = 'action-btn active-btn';
      actionBtn.querySelector('i').className = 'fas fa-shield-halved';
      actionBtnText.textContent = 'Account is Active';
    }
  }

  function handleAction() {
    const isExp = document.getElementById('expiryToggle').checked;
    if (isExp) {
      showToast('Renewal request submitted successfully', 'red');
    } else {
      showToast('Account is in good standing', 'green');
    }
  }

  function toggleExpiry() {
    const expired = document.getElementById('expiryToggle').checked;
    updateUI(expired);
  }

  function showToast(message, type) {
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toastText');
    const icon = toast.querySelector('i');

    toastText.textContent = message;
    toast.className = 'toast ' + type;

    if (type === 'red') {
      icon.className = 'fas fa-exclamation-circle';
    } else {
      icon.className = 'fas fa-check-circle';
    }

    requestAnimationFrame(() => {
      toast.classList.add('show');
    });

    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  updateUI(false);
</script>

</body>
</html>
