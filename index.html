<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Subscriber Account</title>
<style>
  :root{
    --bg: #12161D;
    --surface: #1B212B;
    --surface-raised: #232A36;
    --accent: #2FE6CB;
    --accent-deep: #18B79F;
    --gold: #D9B872;
    --text: #ECF0F4;
    --text-muted: #828B9B;
    --error: #FF6B5E;
    --line: #2A313D;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: radial-gradient(circle at 50% -10%, #1A2C32 0%, var(--bg) 55%);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 32px 16px 60px;
  }
  .wrap{ width:100%; max-width: 420px; }

  .eyebrow{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px 24px;
    animation: rise 0.5s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce){
    .card{ animation: none; }
  }

  /* ---- SIM graphic (login) ---- */
  .sim{
    position: relative;
    width: 92px;
    height: 60px;
    background: linear-gradient(145deg, var(--surface-raised), #1E2531);
    border: 1px solid var(--line);
    clip-path: polygon(0 0, 76% 0, 100% 26%, 100% 100%, 0 100%);
    margin-bottom: 22px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 4px;
  }
  .sim-bars span{
    display:block;
    width: 5px;
    background: var(--accent);
    border-radius: 1px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .sim-bars span:nth-child(1){ height: 10px; animation-delay: 0s; }
  .sim-bars span:nth-child(2){ height: 16px; animation-delay: 0.15s; }
  .sim-bars span:nth-child(3){ height: 22px; animation-delay: 0.3s; }
  .sim-bars span:nth-child(4){ height: 28px; animation-delay: 0.45s; }
  @keyframes pulse{
    0%, 100%{ opacity: 0.35; }
    50%{ opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce){
    .sim-bars span{ animation: none; opacity: 1; }
  }

  h1{
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .hint{
    color: var(--text-muted);
    font-size: 13.5px;
    margin: 0 0 22px;
  }

  input[type="text"]{
    width: 100%;
    background: var(--surface-raised);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--mono);
    font-size: 17px;
    letter-spacing: 0.04em;
    padding: 14px 14px;
    border-radius: 10px;
    outline: none;
  }
  input[type="text"]::placeholder{ color: #535C6B; }
  input[type="text"]:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(47,230,203,0.16);
  }

  .error{
    color: var(--error);
    font-size: 13px;
    margin-top: 10px;
    font-family: var(--sans);
  }

  .btn-primary{
    width: 100%;
    margin-top: 16px;
    background: var(--accent);
    color: #0B2622;
    border: none;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-primary:hover{ background: var(--accent-deep); }
  .btn-primary:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  .data-source{
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .file-btn{
    font-family: var(--mono);
    color: var(--accent);
    border: 1px solid var(--accent-deep);
    padding: 6px 10px;
    border-radius: 7px;
    cursor: pointer;
    white-space: nowrap;
  }
  .file-btn:hover{ background: rgba(47,230,203,0.08); }

  /* ---- profile view ---- */
  .profile-top{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .profile-top strong{ color: var(--text); font-family: var(--mono); }
  .btn-ghost{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-muted);
    font-size: 12.5px;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-ghost:hover{ color: var(--text); border-color: var(--text-muted); }

  .id-card{
    background: linear-gradient(160deg, var(--surface-raised), #1A212B);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 18px;
  }
  .id-card-row{ display:flex; align-items:center; justify-content: space-between; margin-bottom: 14px; }
  .id-chip{
    width: 34px; height: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--gold), #B6904E);
    background-image:
      linear-gradient(135deg, var(--gold), #B6904E),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 5px);
  }
  .signal-mini{ display:flex; gap: 3px; align-items:flex-end; }
  .signal-mini span{ width:4px; background: var(--accent); border-radius:1px; }
  .signal-mini span:nth-child(1){ height:6px; }
  .signal-mini span:nth-child(2){ height:9px; }
  .signal-mini span:nth-child(3){ height:12px; }
  .signal-mini span:nth-child(4){ height:15px; }

  .id-name{
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }
  .id-meta{ display:flex; gap: 24px; }
  .id-meta > div{ display:flex; flex-direction:column; gap:4px; }
  .meta-label{ font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .meta-val.mono{ font-family: var(--mono); font-size: 14.5px; }

  .package-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .package-label{ font-size: 12.5px; color: var(--text-muted); }
  .package-pill{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    background: rgba(47,230,203,0.10);
    border: 1px solid rgba(47,230,203,0.35);
    padding: 5px 12px;
    border-radius: 999px;
  }

  .details-card{
    background: var(--surface-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .details-title{
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .bill-row{
    display:flex;
    align-items: baseline;
    gap: 6px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 14px;
  }
  .bill-row:last-child{ border-bottom: none; }
  .bill-label{ color: var(--text-muted); white-space: nowrap; }
  .bill-leader{
    flex: 1;
    border-bottom: 1px dotted #3A4150;
    transform: translateY(-3px);
  }
  .bill-value{ font-family: var(--mono); white-space: nowrap; }

  .empty-state{
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="wrap">

    <!-- LOGIN VIEW -->
    <section id="loginView" class="card login-card">
      <div class="eyebrow">Subscriber Access</div>
      <div class="sim" aria-hidden="true">
        <div class="sim-bars"><span></span><span></span><span></span><span></span></div>
      </div>
      <h1>Enter your account number</h1>
      <p class="hint">Find it on your bill or SIM pack.</p>
      <form id="loginForm">
        <input type="text" id="accountInput" inputmode="numeric" autocomplete="off" placeholder="e.g. 300256" />
        <div class="error" id="loginError" hidden></div>
        <button type="submit" class="btn-primary">View my account</button>
      </form>
      <div class="data-source">
        <span id="dataStatus">Using sample data — 3 accounts</span>
        <label class="file-btn">
          Load file
          <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" hidden />
        </label>
      </div>
    </section>

    <!-- PROFILE VIEW -->
    <section id="profileView" class="card profile-card" hidden>
      <div class="profile-top">
        <span>Account <strong id="signedInAcct"></strong></span>
        <button id="logoutBtn" class="btn-ghost">Log out</button>
      </div>

      <div class="id-card">
        <div class="id-card-row">
          <div class="id-chip" aria-hidden="true"></div>
          <div class="signal-mini" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="id-name" id="custName"></div>
        <div class="id-meta">
          <div><span class="meta-label">Customer ID</span><span class="meta-val mono" id="custId"></span></div>
          <div><span class="meta-label">Account No.</span><span class="meta-val mono" id="custAcct"></span></div>
        </div>
      </div>

      <div class="package-row">
        <span class="package-label">Active package</span>
        <span class="package-pill" id="custPackage"></span>
      </div>

      <div class="details-card">
        <div class="details-title">Usage &amp; Billing</div>
        <div id="detailsList"></div>
      </div>
    </section>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    // ---- default sample data (used until a real file is loaded) ----
    let customers = [
      { "Customer ID": "12", "Customer Name": "SAEED",  "Account Number": "300256",  "Package detail": "Package1" },
      { "Customer ID": "13", "Customer Name": "ASLAM",  "Account Number": "400245",  "Package detail": "Package2" },
      { "Customer ID": "14", "Customer Name": "RAHEEL", "Account Number": "6033354", "Package detail": "Package3" }
    ];

    const KNOWN = {
      id: ["customer id"],
      name: ["customer name"],
      acct: ["account number"],
      pkg: ["package detail", "package"]
    };

    function findKey(obj, names){
      const keys = Object.keys(obj);
      for (const n of names){
        const k = keys.find(k2 => k2.trim().toLowerCase() === n);
        if (k) return k;
      }
      return null;
    }

    function prettyLabel(key){
      return key
        .replace(/_/g, ' ')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .trim()
        .split(/\s+/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    function formatValue(key, val){
      if (val === '' || val === null || val === undefined) return '—';
      const k = key.toLowerCase();
      const str = String(val).trim();
      const isNumeric = str !== '' && !isNaN(parseFloat(str.replace(/,/g,''))) && /^[\d.,\s]+$/.test(str);

      if (isNumeric && /(amount|bill|balance|due|charge|cost|fee)/.test(k)){
        const num = parseFloat(str.replace(/,/g,''));
        return 'Rs. ' + num.toLocaleString('en-PK');
      }
      if (/(date|expiry|renew)/.test(k)){
        const d = new Date(val);
        if (!isNaN(d.getTime())){
          return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }
      }
      return str;
    }

    // ---- elements ----
    const loginView = document.getElementById('loginView');
    const profileView = document.getElementById('profileView');
    const loginForm = document.getElementById('loginForm');
    const accountInput = document.getElementById('accountInput');
    const loginError = document.getElementById('loginError');
    const dataStatus = document.getElementById('dataStatus');
    const fileInput = document.getElementById('fileInput');
    const logoutBtn = document.getElementById('logoutBtn');

    function showError(msg){
      loginError.textContent = msg;
      loginError.hidden = false;
    }
    function clearError(){
      loginError.hidden = true;
      loginError.textContent = '';
    }

    loginForm.addEventListener('submit', function(e){
      e.preventDefault();
      clearError();
      const val = accountInput.value.trim();
      if (!val){
        showError('Enter your account number.');
        return;
      }
      const match = customers.find(c => {
        const k = findKey(c, KNOWN.acct);
        return k && String(c[k]).trim() === val;
      });
      if (!match){
        showError('Account number not found. Check the number on your bill and try again.');
        return;
      }
      renderProfile(match);
    });

    function renderProfile(match){
      const kId = findKey(match, KNOWN.id);
      const kName = findKey(match, KNOWN.name);
      const kAcct = findKey(match, KNOWN.acct);
      const kPkg = findKey(match, KNOWN.pkg);

      document.getElementById('signedInAcct').textContent = kAcct ? match[kAcct] : '—';
      document.getElementById('custName').textContent = kName ? match[kName] : '—';
      document.getElementById('custId').textContent = kId ? match[kId] : '—';
      document.getElementById('custAcct').textContent = kAcct ? match[kAcct] : '—';
      document.getElementById('custPackage').textContent = kPkg ? match[kPkg] : '—';

      const usedKeys = new Set([kId, kName, kAcct, kPkg].filter(Boolean));
      const extraKeys = Object.keys(match).filter(k => !usedKeys.has(k));

      const list = document.getElementById('detailsList');
      list.innerHTML = '';

      if (extraKeys.length === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No usage or billing data yet. Add columns such as "Data Used (GB)" or "Amount Due" to your file — they will show up here automatically the next time it is loaded.';
        list.appendChild(empty);
      } else {
        extraKeys.forEach(k => {
          const row = document.createElement('div');
          row.className = 'bill-row';
          row.innerHTML =
            '<span class="bill-label">' + prettyLabel(k) + '</span>' +
            '<span class="bill-leader"></span>' +
            '<span class="bill-value">' + formatValue(k, match[k]) + '</span>';
          list.appendChild(row);
        });
      }

      loginView.hidden = true;
      profileView.hidden = false;
    }

    logoutBtn.addEventListener('click', function(){
      profileView.hidden = true;
      loginView.hidden = false;
      accountInput.value = '';
      clearError();
    });

    fileInput.addEventListener('change', function(e){
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt){
        try{
          const data = new Uint8Array(evt.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });
          if (!json.length){
            dataStatus.textContent = 'That file had no rows — still using sample data.';
            return;
          }
          customers = json;
          dataStatus.textContent = 'Loaded ' + file.name + ' — ' + customers.length + ' accounts';
        } catch(err){
          dataStatus.textContent = 'Could not read that file — still using sample data.';
        }
      };
      reader.readAsArrayBuffer(file);
    });
  </script>
</body>
</html>
