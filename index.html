<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>MR Cable & Networks - My Account</title>
<style>
  :root{
    --bg:#12161D;
    --surface:#1B212B;
    --surface-raised:#232A36;
    --accent:#2FE6CB;
    --accent-deep:#18B79F;
    --gold:#D9B872;
    --text:#ECF0F4;
    --text-muted:#828B9B;
    --error:#FF6B5E;
    --success:#5FE07E;
    --line:#2A313D;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 60px;
    background:radial-gradient(circle at 50% -10%,#1A2C32 0%,var(--bg) 55%);
    color:var(--text);
    font-family:var(--sans);
  }
  .wrap{width:100%;max-width:420px}
  .eyebrow{
    margin-bottom:18px;
    color:var(--text-muted);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
  }
  .card{
    padding:28px 24px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:18px;
    animation:rise .5s ease both;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }
  @media (prefers-reduced-motion:reduce){
    .card,.sim-bars span{animation:none}
  }
  .sim{
    position:relative;
    width:92px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    margin-bottom:22px;
    background:linear-gradient(145deg,var(--surface-raised),#1E2531);
    border:1px solid var(--line);
    clip-path:polygon(0 0,76% 0,100% 26%,100% 100%,0 100%);
  }
  .sim-bars span{
    display:block;
    width:5px;
    background:var(--accent);
    border-radius:1px;
    animation:pulse 1.2s ease-in-out infinite;
  }
  .sim-bars span:nth-child(1){height:10px;animation-delay:0s}
  .sim-bars span:nth-child(2){height:16px;animation-delay:.15s}
  .sim-bars span:nth-child(3){height:22px;animation-delay:.3s}
  .sim-bars span:nth-child(4){height:28px;animation-delay:.45s}
  @keyframes pulse{
    0%,100%{opacity:.35}
    50%{opacity:1}
  }
  h1{
    margin:0 0 6px;
    font-size:22px;
    font-weight:700;
    letter-spacing:0;
  }
  .hint{
    margin:0 0 22px;
    color:var(--text-muted);
    font-size:13.5px;
  }
  .field{position:relative;margin-top:12px}
  .field:first-child{margin-top:0}
  input[type="text"],input[type="password"]{
    width:100%;
    padding:14px;
    background:var(--surface-raised);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--text);
    font-family:var(--mono);
    font-size:17px;
    letter-spacing:.04em;
    outline:none;
  }
  input::placeholder{color:#535C6B}
  input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(47,230,203,.16);
  }
  .password-field input{padding-right:60px}
  .toggle-pass{
    position:absolute;
    right:8px;
    top:50%;
    padding:4px 6px;
    transform:translateY(-50%);
    background:none;
    border:0;
    color:var(--accent);
    font-family:var(--mono);
    font-size:12px;
    cursor:pointer;
  }
  .error{
    margin-top:10px;
    color:var(--error);
    font-size:13px;
  }
  .btn-primary{
    width:100%;
    margin-top:16px;
    padding:14px 16px;
    background:var(--accent);
    border:0;
    border-radius:10px;
    color:#0B2622;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-primary:hover{background:var(--accent-deep)}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed}
  .btn-primary:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .profile-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    color:var(--text-muted);
    font-size:13px;
  }
  .profile-top strong{color:var(--text);font-family:var(--mono)}
  .btn-ghost{
    padding:7px 12px;
    background:transparent;
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text-muted);
    font-size:12.5px;
    cursor:pointer;
  }
  .btn-ghost:hover{color:var(--text);border-color:var(--text-muted)}
  .id-card{
    padding:20px;
    margin-bottom:18px;
    background:linear-gradient(160deg,var(--surface-raised),#1A212B);
    border:1px solid var(--line);
    border-radius:16px;
  }
  .id-card-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .id-chip{
    width:34px;
    height:24px;
    background:linear-gradient(135deg,var(--gold),#B6904E);
    border-radius:4px;
  }
  .signal-mini{display:flex;align-items:flex-end;gap:3px}
  .signal-mini span{width:4px;background:var(--accent);border-radius:1px}
  .signal-mini span:nth-child(1){height:6px}
  .signal-mini span:nth-child(2){height:9px}
  .signal-mini span:nth-child(3){height:12px}
  .signal-mini span:nth-child(4){height:15px}
  .id-name{
    margin-bottom:14px;
    font-size:21px;
    font-weight:700;
    letter-spacing:0;
  }
  .id-meta{display:flex;gap:24px;flex-wrap:wrap}
  .id-meta>div{display:flex;flex-direction:column;gap:4px}
  .meta-label{
    color:var(--text-muted);
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  .meta-val.mono{font-family:var(--mono);font-size:14.5px}
  .package-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-bottom:18px;
  }
  .package-label{color:var(--text-muted);font-size:12.5px}
  .package-pill{
    padding:5px 12px;
    background:rgba(47,230,203,.1);
    border:1px solid rgba(47,230,203,.35);
    border-radius:999px;
    color:var(--accent);
    font-family:var(--mono);
    font-size:13px;
    text-align:right;
  }
  .package-pill.expired{
    background:rgba(255,107,94,.1);
    border-color:rgba(255,107,94,.35);
    color:var(--error);
  }
  .package-pill.active{
    background:rgba(95,224,126,.1);
    border-color:rgba(95,224,126,.35);
    color:var(--success);
  }
  .details-card{
    padding:16px 18px;
    background:var(--surface-raised);
    border:1px solid var(--line);
    border-radius:14px;
  }
  .details-title{
    margin-bottom:10px;
    color:var(--text-muted);
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
  }
  .bill-row{
    display:flex;
    align-items:baseline;
    gap:6px;
    padding:8px 0;
    border-bottom:1px dashed var(--line);
    font-size:14px;
  }
  .bill-row.wrap{align-items:flex-start;flex-wrap:wrap}
  .bill-row:last-child{border-bottom:0}
  .bill-label{color:var(--text-muted);white-space:nowrap}
  .bill-leader{
    flex:1;
    border-bottom:1px dotted #3A4150;
    transform:translateY(-3px);
  }
  .bill-row.wrap .bill-leader{display:none}
  .bill-value{font-family:var(--mono);white-space:nowrap}
  .bill-row.wrap .bill-value{
    flex:1;
    max-width:60%;
    text-align:right;
    white-space:normal;
  }
  .empty-state{
    color:var(--text-muted);
    font-size:13px;
    line-height:1.5;
  }
</style>
</head>
<body>
  <div class="wrap">
    <section id="loginView" class="card login-card">
      <div class="eyebrow">MR Cable &amp; Networks</div>
      <div class="sim" aria-hidden="true">
        <div class="sim-bars"><span></span><span></span><span></span><span></span></div>
      </div>
      <h1>Check your account</h1>
      <p class="hint">Enter your phone number and the last 4 digits of that same number.</p>
      <form id="loginForm">
        <div class="field">
          <input type="text" id="accountInput" inputmode="numeric" autocomplete="off" placeholder="Phone number, e.g. 03144003910" />
        </div>
        <div class="field password-field">
          <input type="password" id="passwordInput" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="Last 4 digits" />
          <button type="button" id="togglePass" class="toggle-pass" aria-label="Show password">Show</button>
        </div>
        <div class="error" id="loginError" hidden></div>
        <button type="submit" class="btn-primary">View my account</button>
      </form>
    </section>

    <section id="profileView" class="card profile-card" hidden>
      <div class="profile-top">
        <span>Account <strong id="signedInAcct"></strong></span>
        <button id="logoutBtn" class="btn-ghost">Log out</button>
      </div>

      <div class="id-card">
        <div class="id-card-row">
          <div class="id-chip" aria-hidden="true"></div>
          <div class="signal-mini" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="id-name" id="custName"></div>
        <div class="id-meta">
          <div><span class="meta-label">Customer ID</span><span class="meta-val mono" id="custId"></span></div>
          <div><span class="meta-label">Phone</span><span class="meta-val mono" id="custAcct"></span></div>
          <div><span class="meta-label">Package</span><span class="meta-val mono" id="custPackage"></span></div>
        </div>
      </div>

      <div class="package-row">
        <span class="package-label">Status</span>
        <span class="package-pill" id="custStatus"></span>
      </div>
      <div class="package-row">
        <span class="package-label">Expires</span>
        <span class="package-pill" id="custExpiry"></span>
      </div>
      <div class="package-row">
        <span class="package-label">Balance</span>
        <span class="package-pill" id="custBalance"></span>
      </div>

      <div class="details-card">
        <div class="details-title">Other Details</div>
        <div id="detailsList"></div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://iuzwdjgagcxqwtpihpmb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1endkamdhZ2N4cXd0cGlocG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzQ0NzMsImV4cCI6MjA5ODExMDQ3M30.h_ofLT6hKZUsiw3lfZh2qAO62C1BT78k4dSjGXrzAow';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const KNOWN_FIELDS = ['customer_id', 'customer_name', 'contact', 'cnic', 'package', 'expiration_date', 'balance', 'status'];

    const loginView = document.getElementById('loginView');
    const profileView = document.getElementById('profileView');
    const loginForm = document.getElementById('loginForm');
    const accountInput = document.getElementById('accountInput');
    const passwordInput = document.getElementById('passwordInput');
    const togglePass = document.getElementById('togglePass');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');

    function prettyLabel(key){
      return key
        .replace(/_/g, ' ')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .trim()
        .split(/\s+/)
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    function formatValue(key, val){
      if (val === '' || val === null || val === undefined) return '-';
      const lowerKey = key.toLowerCase();
      const str = String(val).trim();
      const isNumeric = str !== '' && !Number.isNaN(parseFloat(str.replace(/,/g, ''))) && /^[\d.,\s]+$/.test(str);

      if (isNumeric && /(amount|bill|balance|due|charge|cost|fee)/.test(lowerKey)){
        const num = parseFloat(str.replace(/,/g, ''));
        return 'Rs. ' + num.toLocaleString('en-PK');
      }
      if (/(date|expiry|renew)/.test(lowerKey)){
        const date = new Date(val);
        if (!Number.isNaN(date.getTime())){
          return date.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
        }
      }
      return str;
    }

    function setText(id, value){
      document.getElementById(id).textContent = value || '-';
    }

    function showError(message){
      loginError.textContent = message;
      loginError.hidden = false;
    }

    function clearError(){
      loginError.textContent = '';
      loginError.hidden = true;
    }

    function addDetailRow(list, key, value){
      const row = document.createElement('div');
      row.className = 'bill-row' + (key.toLowerCase() === 'address' ? ' wrap' : '');

      const label = document.createElement('span');
      label.className = 'bill-label';
      label.textContent = prettyLabel(key);

      const leader = document.createElement('span');
      leader.className = 'bill-leader';

      const val = document.createElement('span');
      val.className = 'bill-value';
      val.textContent = formatValue(key, value);

      row.append(label, leader, val);
      list.appendChild(row);
    }

    loginForm.addEventListener('submit', async function(event){
      event.preventDefault();
      clearError();

      const phoneVal = accountInput.value.trim();
      const last4Val = passwordInput.value.trim();
      if (!phoneVal || !last4Val){
        showError('Enter your phone number and the last 4 digits.');
        return;
      }

      const submitBtn = loginForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking...';

      try{
        const { data, error } = await supabaseClient.functions.invoke('login', {
          body: { phone: phoneVal, last4: last4Val }
        });

        if (error || !data || data.error || !data.customer){
          showError('Phone number or last 4 digits is incorrect.');
          return;
        }
        renderProfile(data.customer);
      } catch (err){
        showError('Could not reach the server. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'View my account';
      }
    });

    function renderProfile(customer){
      setText('signedInAcct', customer.contact);
      setText('custName', customer.customer_name);
      setText('custId', customer.customer_id);
      setText('custAcct', customer.contact);
      setText('custPackage', customer.package);

      const isExpired = customer.status === 'Deactive';
      const statusEl = document.getElementById('custStatus');
      statusEl.textContent = customer.status || '-';
      statusEl.classList.toggle('expired', isExpired);
      statusEl.classList.toggle('active', !isExpired);

      const expiryEl = document.getElementById('custExpiry');
      expiryEl.textContent = formatValue('expiration_date', customer.expiration_date);
      expiryEl.classList.toggle('expired', isExpired);

      setText('custBalance', formatValue('balance', customer.balance));

      const list = document.getElementById('detailsList');
      list.replaceChildren();
      const extraKeys = Object.keys(customer).filter((key) => !KNOWN_FIELDS.includes(key));

      if (extraKeys.length === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No other details on file.';
        list.appendChild(empty);
      } else {
        extraKeys.forEach((key) => addDetailRow(list, key, customer[key]));
      }

      loginView.hidden = true;
      profileView.hidden = false;
    }

    logoutBtn.addEventListener('click', function(){
      profileView.hidden = true;
      loginView.hidden = false;
      accountInput.value = '';
      passwordInput.value = '';
      clearError();
    });

    togglePass.addEventListener('click', function(){
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      togglePass.textContent = isHidden ? 'Hide' : 'Show';
      togglePass.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });
  </script>
</body>
</html>
