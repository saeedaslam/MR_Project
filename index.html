<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>M.R. Cable & Internet Network (R) — My Account</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0c0e14;--bg-card:#161922;--bg-card-alt:#1c2030;--bg-input:#1a1e2a;
  --fg:#e4e7f0;--fg-muted:#6b7194;--fg-dim:#464b6a;
  --border:#252a3a;--border-light:#2f3549;
  --green:#00e68a;--cyan:#00d4ff;--orange:#ff8c42;--rose:#ff4f7b;
  --green-dim:rgba(0,230,138,0.08);--cyan-dim:rgba(0,212,255,0.08);
  --radius:12px;--radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 500px 350px at 20% 10%,rgba(0,212,255,0.04),transparent 70%),
  radial-gradient(ellipse 400px 400px at 80% 90%,rgba(0,230,138,0.03),transparent 70%);}

/* Login Screen */
.login-screen{position:fixed;inset:0;z-index:10000;overflow-y:auto;background:var(--bg);transition:opacity .45s,visibility .45s;}
.login-screen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.login-inner{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 60px;}
.login-box{width:100%;max-width:400px;padding:32px 24px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
.login-box::before{content:'';position:absolute;top:-50%;left:-20%;width:140%;height:100%;background:radial-gradient(ellipse,rgba(0,212,255,0.06),transparent 70%);pointer-events:none;}
.sim-icon{display:inline-flex;align-items:flex-end;gap:4px;margin-bottom:18px;padding:10px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;position:relative;z-index:1;}
.sim-icon span{display:block;width:5px;background:var(--cyan);border-radius:2px;animation:barPulse 1.2s ease-in-out infinite;}
.sim-icon span:nth-child(1){height:10px;animation-delay:0s;} .sim-icon span:nth-child(2){height:16px;animation-delay:.15s;}
.sim-icon span:nth-child(3){height:22px;animation-delay:.3s;} .sim-icon span:nth-child(4){height:28px;animation-delay:.45s;}
@keyframes barPulse{0%,100%{opacity:.35;}50%{opacity:1;}}
.login-logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1;}
.login-sub{color:var(--fg-muted);font-size:12px;margin-bottom:22px;position:relative;z-index:1;line-height:1.5;}
.login-field{margin-bottom:12px;text-align:left;position:relative;z-index:1;}
.login-field label{display:block;font-size:10px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
.login-field input{width:100%;padding:11px 13px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--fg);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.login-field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.12);}
.pass-wrap{position:relative;} .pass-wrap input{padding-right:52px;}
.toggle-pass{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--cyan);font-size:11px;font-weight:600;cursor:pointer;padding:4px 6px;font-family:inherit;}
.login-btn{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--cyan),#0099cc);color:#051520;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;position:relative;z-index:1;}
.login-btn:hover{box-shadow:0 4px 24px rgba(0,212,255,0.3);transform:translateY(-1px);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.login-error{color:var(--rose);font-size:12px;margin-top:10px;min-height:18px;position:relative;z-index:1;}

/* Sliders & Cards */
.slider-section{width:100%;max-width:400px;margin-top:28px;flex-shrink:0;}
.slider-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.slider-wrap{position:relative;}
.slider-track{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;padding:6px 40px;scrollbar-width:none;}
.slider-track::-webkit-scrollbar{display:none;}
.slider-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);color:var(--fg-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;z-index:2;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.slider-arrow:hover{background:var(--bg-card-alt);color:var(--fg);border-color:var(--border-light);}
.slider-arrow.left{left:2px;} .slider-arrow.right{right:2px;}
.pkg-slide{scroll-snap-align:start;flex-shrink:0;width:135px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;transition:all .25s;}
.pkg-slide:hover{border-color:var(--border-light);transform:translateY(-2px);}
.pkg-slide-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px;}
.pkg-slide-speed{font-size:10px;color:var(--fg-muted);margin-bottom:10px;}
.pkg-slide-price{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;line-height:1;}
.pkg-slide-price span{font-size:11px;font-weight:500;color:var(--fg-muted);}
.pkg-slide-features{list-style:none;margin-top:10px;text-align:left;}
.pkg-slide-features li{font-size:10px;color:var(--fg-dim);padding:3px 0;display:flex;align-items:center;gap:5px;}
.pkg-slide-features li i{font-size:8px;color:var(--green);width:12px;text-align:center;flex-shrink:0;}

.payment-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.payment-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg-card-alt);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--orange);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px;}
.payment-body{padding:18px;}
.pay-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.pay-tab{padding:10px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--fg-muted);font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.pay-tab.active{border-color:rgba(255,140,66,0.3);background:rgba(255,140,66,0.06);color:var(--orange);}
.pay-detail{display:none;} .pay-detail.show{display:block;animation:fadeUp .25s ease-out;}
.pay-detail-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;}
.pay-detail-row:last-child{border:none;}
.pay-detail-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:rgba(255,140,66,0.1);color:var(--orange);margin-top:1px;}
.pay-detail-label{color:var(--fg-muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
.pay-detail-value{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin-top:1px;word-break:break-all;}
.payment-note{margin-top:14px;padding:10px 14px;border-radius:var(--radius-sm);background:rgba(255,140,66,0.06);border:1px solid rgba(255,140,66,0.15);font-size:12px;color:var(--orange);line-height:1.5;}

.office-card{width:100%;max-width:400px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-top:24px;flex-shrink:0;}
.office-inner{padding:16px 18px;}
.office-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.office-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12.5px;}
.office-row:last-child{border:none;}
.office-row i{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.oi-clock{background:var(--cyan-dim);color:var(--cyan);} .oi-yt{background:rgba(255,0,0,0.1);color:#FF4444;}
.oi-fb{background:rgba(24,119,242,0.1);color:#1877F2;} .oi-web{background:var(--green-dim);color:var(--green);}
.office-row-text{line-height:1.5;} .office-row-text strong{color:var(--fg);font-weight:600;}
.office-row-text span{color:var(--fg-muted);font-size:12px;} .office-row-text a{color:var(--cyan);text-decoration:none;font-weight:600;}

/* Dashboard */
.dashboard{display:none;min-height:100vh;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.dashboard.active{display:flex;}
.topbar{width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(12,14,20,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-divider{width:1px;height:20px;background:var(--border);} .topbar-page{font-size:13px;color:var(--fg-muted);font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:100px;background:var(--cyan-dim);border:1px solid rgba(0,212,255,0.15);font-size:11px;color:var(--cyan);font-weight:600;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--green));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#051520;}
.btn-logout{display:flex;align-items:center;gap:5px;padding:6px 14px;border:1px solid rgba(255,79,123,0.25);border-radius:var(--radius-sm);background:rgba(255,79,123,0.06);color:var(--rose);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;}
.btn-logout:hover{background:rgba(255,79,123,0.14);border-color:rgba(255,79,123,0.4);transform:translateY(-1px);}
.main-content{width:100%;max-width:600px;flex:1 1 0 0 auto;padding:20px;}
.id-card{background:linear-gradient(160deg,var(--bg-card-alt),#171c28);border:1px solid var(--border);border-radius:16px;padding:22px 20px;margin-bottom:20px;position:relative;overflow:hidden;}
.id-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1;}
.id-chip{width:34px;height:24px;border-radius:4px;background:linear-gradient(135deg,#D9B872,#B6904E);}
.signal-mini{display:flex;gap:3px;align-items:flex-end;}
.signal-mini span{width:4px;background:var(--cyan);border-radius:1px;}
.signal-mini span:nth-child(1){height:6px;} .signal-mini span:nth-child(2){height:9px;}
.signal-mini span:nth-child(3){height:12px;} .signal-mini span:nth-child(4){height:15px;}
.id-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:14px;position:relative;z-index:1;}
.id-meta{display:flex;gap:20px;flex-wrap:wrap;position:relative;z-index:1;}
.id-meta>div{display:flex;flex-direction:column;gap:3px;}
.meta-label{font-size:10px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.meta-val{font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:600;}
.info-grid{display:grid;gap:10px;margin-bottom:20px;}
.info-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;transition:border-color .2s;}
.info-row:hover{border-color:var(--border-light);}
.info-left{display:flex;align-items:center;gap:10px;}
.info-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.info-icon.cyan{background:var(--cyan-dim);color:var(--cyan);} .info-icon.green{background:var(--green-dim);color:var(--green);}
.info-icon.orange{background:rgba(255,140,66,0.08);color:var(--orange);}
.info-label{font-size:11px;color:var(--fg-muted);font-weight:500;}
.info-value{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;margin-top:1px;}
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700;font-family:'Space Grotesk',sans-serif;}
.active{background:rgba(0,230,138,0.1);color:var(--green);border:1px solid rgba(0,230,138,0.2);}
.pending{background:rgba(255,179,71,0.1);color:#ffb347;border:1px solid rgba(255,179,71,0.2);}
.expired{background:rgba(255,79,123,0.1);color:var(--rose);border:1px solid rgba(255,79,123,0.2);}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.details-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.details-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg-card-alt);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px;}
.detail-row{display:flex;align-items:baseline;gap:8px;padding:11px 18px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--fg-muted);white-space:nowrap;font-weight:500;min-width:90px;}
.detail-value{font-family:'Space Grotesk',sans-serif;font-weight:600;margin-left:auto;}

.toast-container{position:fixed;top:16px;right:16px;left:16px;z-index:99999;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none;}
.toast{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,0.4);pointer-events:auto;animation:toastIn .4s cubic-bezier(.16,1,.3,1);max-width:360px;backdrop-filter:blur(12px);width:100%;}
.toast.success{background:rgba(0,230,138,0.12);border:1px solid rgba(0,230,138,0.3);color:var(--green);}
.toast.error{background:rgba(255,79,123,0.12);border:1px solid rgba(255,79,123,0.3);color:var(--rose);}
.toast.info{background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.3);color:var(--cyan);}
.toast-exit{animation:toastOut .3s ease-in forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px) scale(.96);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .4s ease-out both;}

@media(max-width:600px){
  .main-content{padding:18px 12px 40px;} .topbar{padding:10px 14px;} .id-meta{gap:14px;} .info-row{padding:12px 14px;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-inner">
    <div class="login-box">
      <div class="sim-icon" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
      <div class="login-logo">M.R. Cable & Internet Network (R)</div>
      <div class="login-sub">Enter your phone number and the last 4 digits of your CNIC to view your account.</div>
      <div class="login-field">
        <label>Phone Number</label>
        <input type="text" id="phoneInput" inputmode="numeric" autocomplete="off" placeholder="e.g. 03144003910">
      </div>
      <div class="login-field">
        <label>Last 4 Digits of CNIC</label>
        <div class="pass-wrap">
          <input type="password" id="last4Input" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="e.g. 3910">
          <button type="button" id="togglePass" class="toggle-pass">Show</button>
        </div>
      </div>
      <button class="login-btn" id="loginBtn"><i class="fa-solid fa-right-to-bracket"></i>&nbsp; View My Account</button>
      <div class="login-error" id="loginError"></div>
    </div>

    <div class="slider-section">
      <div class="slider-title"><i class="fa-solid fa-bolt"></i> Our Packages</div>
      <div class="slider-wrap" id="loginPkgWrap" onmouseenter="pauseSlider()" onmouseleave="resumeSlider('loginPkgTrack')">
        <button class="slider-arrow left" onclick="scrollSlider('loginPkgTrack',-150)"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="slider-track" id="loginPkgTrack"></div>
        <button class="slider-arrow right" onclick="scrollSlider('loginPkgTrack',150)"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>
    <div class="slider-section"><div id="loginPayment"></div></div>
    <div class="office-card" id="loginOffice"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <nav class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">M.R. Cable & Internet Network (R)</div>
      <div class="topbar-divider"></div>
      <span class="topbar-page">My Account</span>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userPhoneDisplay">—</span>
      </div>
      <button class="btn-logout" onclick="handleLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
    </div>
  </nav>
  <main class="main-content" id="profileContent"></main>
</div>

<div class="toast-container" id="toastContainer"></div>

function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
function formatValue(key, val) {
  if (val === '' || val == null) return '—';
  const k = key.toLowerCase(), str = String(val).trim();
  if (/(amount|bill|balance|due|charge|cost|fee)/.test(k)) {
    const num = parseFloat(str.replace(/,/g, ''));
    if (!isNaN(num)) return 'RS ' + num.toLocaleString('en-PK');
  }
  if (/(date|expiry|renew)/.test(k)) {
    const d = new Date(str); if (!isNaN(d.getTime())) return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  return str;
}
function calcStatus(exp) {
  if (!exp) return 'expired';
  const e = new Date(exp + 'T00:00:00'), n = new Date(); n.setHours(0,0,0,0);
  const d = (e - n) / 864e5;
  if (d < 0) return 'expired'; if (d <= 7) return 'pending'; return 'active';
}
function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className = `toast ${type}`;
  const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info', warning: 'fa-triangle-exclamation' };
  t.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('toast-exit'); setTimeout(() => t.remove(), 300); }, 4000);
}

function renderPackages(containerId) {
  const track = document.getElementById(containerId); if (!track) return;
  track.innerHTML = PACKAGES.map(p => `

      <div class="pkg-slide-price">RS ${p.price.toLocaleString()}<span>/mo</span></div>
      <ul class="pkg-slide-features">${p.features.map(f => `<li><i class="fa-solid fa-check"></i> ${esc(f)}</li>`).join('')}</ul>
    </div>`).join('');
}

function switchPayTab(id, el) {
  document.querySelectorAll('.pay-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.pay-detail').forEach(d => d.classList.remove('show'));

}

}

function scrollSlider(trackId, amount) { const t = document.getElementById(trackId); if (t) t.scrollBy({ left: amount, behavior: 'smooth' }); }
let sliderInterval;
function startAutoSlider(trackId) { sliderInterval = setInterval(() => { const t = document.getElementById(trackId); if(t) { if(t.scrollLeft + t.clientWidth >= t.scrollWidth - 10) t.scrollTo({left:0, behavior:'smooth'}); else t.scrollBy({left:150, behavior:'smooth'}); } }, 3000); }
function pauseSlider() { clearInterval(sliderInterval); }
function resumeSlider(trackId) { startAutoSlider(trackId); }

function resetLoginBtn() { const btn = document.getElementById('loginBtn'); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i>&nbsp; View My Account'; }

async function handleLogin() {
  const phone = document.getElementById('phoneInput').value.trim();
  const last4 = document.getElementById('last4Input').value.trim();
  const errEl = document.getElementById('loginError'); errEl.textContent = '';
  if (!phone || !last4) { errEl.textContent = 'Please enter your phone number and last 4 digits.'; return; }
  if (last4.length !== 4 || isNaN(last4)) { errEl.textContent = 'Last 4 digits must be a 4-digit number.'; return; }

  const btn = document.getElementById('loginBtn'); btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>&nbsp; Loading...';
  try {
    const { data, error } = await sb.from('customers').select('*').eq('contact', phone);
    if (error) throw error;
    if (!data || data.length === 0) { errEl.textContent = 'No account found with this phone number.'; resetLoginBtn(); return; }
    
    const customer = data.find(c => String(c.cnic || '').replace(/\D/g, '').endsWith(last4));
    if (!customer) { errEl.textContent = 'Incorrect last 4 digits. Please check your CNIC.'; resetLoginBtn(); return; }

    customerData = customer;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    renderDashboard(customer);
  } catch (err) { errEl.textContent = 'Error: ' + err.message; resetLoginBtn(); }
}

function handleLogout() {
  customerData = null;
  document.getElementById('phoneInput').value = ''; document.getElementById('last4Input').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginScreen').classList.remove('hidden');
  resetLoginBtn(); showToast('Logged out successfully.', 'info');
}

      <div class="id-name">${esc(c.customer_name || 'Customer')}</div>
      <div class="id-meta">
        <div><div class="meta-label">Customer ID</div><div class="meta-val">${esc(c.customer_id || '—')}</div></div>
        <div><div class="meta-label">Package</div><div class="meta-val">${esc(c.package || '—')}</div></div>
        <div><div class="meta-label">Status</div><div class="meta-val"><span class="status-pill ${statusClass}"><span class="status-dot"></span> ${status.charAt(0).toUpperCase() + status.slice(1)}</span></div></div>
      </div>
    </div>
    <div class="info-grid fade-up">
      <div class="info-row"><div class="info-left"><div class="info-icon cyan"><i class="fa-solid fa-calendar-days"></i></div><div><div class="info-label">Expiry Date</div><div class="info-value">${formatValue('expiration_date', c.expiration_date)}</div></div></div></div>
      <div class="info-row"><div class="info-left"><div class="info-icon green"><i class="fa-solid fa-wallet"></i></div><div><div class="info-label">Current Balance</div><div class="info-value">${formatValue('balance', c.balance)}</div></div></div></div>
      <div class="info-row"><div class="info-left"><div class="info-icon orange"><i class="fa-solid fa-location-dot"></i></div><div><div class="info-label">Address</div><div class="info-value" style="white-space:normal; max-width:250px;">${esc(c.address || '—')}</div></div></div></div>
    </div>
    <div class="details-card fade-up">
      <div class="details-header"><i class="fa-solid fa-circle-info"></i> Account Details</div>
      <div class="detail-row"><div class="detail-label">CNIC</div><div class="detail-value">${esc(c.cnic || '—')}</div></div>
      <div class="detail-row"><div class="detail-label">Phone</div><div class="detail-value">${esc(c.contact || '—')}</div></div>

}

document.getElementById('togglePass').addEventListener('click', function() {
  const inp = document.getElementById('last4Input');
  if (inp.type === 'password') { inp.type = 'text'; this.textContent = 'Hide'; } 
  else { inp.type = 'password'; this.textContent = 'Show'; }
});

  document.getElementById('phoneInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('last4Input').focus(); });
  document.getElementById('last4Input').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
});
