<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Subscriber Account</title>
<style>
  :root{
    --bg: #12161D;
    --surface: #1B212B;
    --surface-raised: #232A36;
    --accent: #2FE6CB;
    --accent-deep: #18B79F;
    --gold: #D9B872;
    --text: #ECF0F4;
    --text-muted: #828B9B;
    --error: #FF6B5E;
    --line: #2A313D;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: radial-gradient(circle at 50% -10%, #1A2C32 0%, var(--bg) 55%);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 32px 16px 60px;
  }
  .wrap{ width:100%; max-width: 420px; }

  .eyebrow{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px 24px;
    animation: rise 0.5s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce){
    .card{ animation: none; }
  }

  .sim{
    position: relative;
    width: 92px;
    height: 60px;
    background: linear-gradient(145deg, var(--surface-raised), #1E2531);
    border: 1px solid var(--line);
    clip-path: polygon(0 0, 76% 0, 100% 26%, 100% 100%, 0 100%);
    margin-bottom: 22px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 4px;
  }
  .sim-bars span{
    display:block;
    width: 5px;
    background: var(--accent);
    border-radius: 1px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .sim-bars span:nth-child(1){ height: 10px; animation-delay: 0s; }
  .sim-bars span:nth-child(2){ height: 16px; animation-delay: 0.15s; }
  .sim-bars span:nth-child(3){ height: 22px; animation-delay: 0.3s; }
  .sim-bars span:nth-child(4){ height: 28px; animation-delay: 0.45s; }
  @keyframes pulse{
    0%, 100%{ opacity: 0.35; }
    50%{ opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce){
    .sim-bars span{ animation: none; opacity: 1; }
  }

  h1{
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .hint{
    color: var(--text-muted);
    font-size: 13.5px;
    margin: 0 0 22px;
  }

  input[type="text"], input[type="password"]{
    width: 100%;
    background: var(--surface-raised);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--mono);
    font-size: 17px;
    letter-spacing: 0.04em;
    padding: 14px 14px;
    border-radius: 10px;
    outline: none;
  }
  input[type="text"]::placeholder, input[type="password"]::placeholder{ color: #535C6B; }
  input[type="text"]:focus, input[type="password"]:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(47,230,203,0.16);
  }

  .field{ position: relative; margin-top: 12px; }
  .field:first-child{ margin-top: 0; }
  .password-field input{ padding-right: 60px; }
  .toggle-pass{
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 6px;
  }

  .error{
    color: var(--error);
    font-size: 13px;
    margin-top: 10px;
    font-family: var(--sans);
  }

  .btn-primary{
    width: 100%;
    margin-top: 16px;
    background: var(--accent);
    color: #0B2622;
    border: none;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-primary:hover{ background: var(--accent-deep); }
  .btn-primary:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  .profile-top{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .profile-top strong{ color: var(--text); font-family: var(--mono); }
  .btn-ghost{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-muted);
    font-size: 12.5px;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-ghost:hover{ color: var(--text); border-color: var(--text-muted); }

  .id-card{
    background: linear-gradient(160deg, var(--surface-raised), #1A212B);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 18px;
  }
  .id-card-row{ display:flex; align-items:center; justify-content: space-between; margin-bottom: 14px; }
  .id-chip{
    width: 34px; height: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--gold), #B6904E);
    background-image:
      linear-gradient(135deg, var(--gold), #B6904E),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 5px);
  }
  .signal-mini{ display:flex; gap: 3px; align-items:flex-end; }
  .signal-mini span{ width:4px; background: var(--accent); border-radius:1px; }
  .signal-mini span:nth-child(1){ height:6px; }
  .signal-mini span:nth-child(2){ height:9px; }
  .signal-mini span:nth-child(3){ height:12px; }
  .signal-mini span:nth-child(4){ height:15px; }

  .id-name{
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }
  .id-meta{ display:flex; gap: 24px; }
  .id-meta > div{ display:flex; flex-direction:column; gap:4px; }
  .meta-label{ font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .meta-val.mono{ font-family: var(--mono); font-size: 14.5px; }

  .package-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .package-label{ font-size: 12.5px; color: var(--text-muted); }
  .package-pill{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    background: rgba(47,230,203,0.10);
    border: 1px solid rgba(47,230,203,0.35);
    padding: 5px 12px;
    border-radius: 999px;
  }

  .details-card{
    background: var(--surface-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .details-title{
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .bill-row{
    display:flex;
    align-items: baseline;
    gap: 6px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 14px;
  }
  .bill-row:last-child{ border-bottom: none; }
  .bill-label{ color: var(--text-muted); white-space: nowrap; }
  .bill-leader{
    flex: 1;
    border-bottom: 1px dotted #3A4150;
    transform: translateY(-3px);
  }
  .bill-value{ font-family: var(--mono); white-space: nowrap; }

  .empty-state{
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="wrap">

    <!-- LOGIN VIEW -->
    <section id="loginView" class="card login-card">
      <div class="eyebrow">Subscriber Access</div>
      <div class="sim" aria-hidden="true">
        <div class="sim-bars"><span></span><span></span><span></span><span></span></div>
      </div>
      <h1>Enter your account number</h1>
      <p class="hint">Use the account number and password your provider gave you.</p>
      <form id="loginForm">
        <div class="field">
          <input type="text" id="accountInput" inputmode="numeric" autocomplete="off" placeholder="Account number, e.g. 300256" />
        </div>
        <div class="field password-field">
          <input type="password" id="passwordInput" autocomplete="off" placeholder="Password" />
          <button type="button" id="togglePass" class="toggle-pass" aria-label="Show password">Show</button>
        </div>
        <div class="error" id="loginError" hidden></div>
        <button type="submit" class="btn-primary">View my account</button>
      </form>
    </section>

    <!-- PROFILE VIEW -->
    <section id="profileView" class="card profile-card" hidden>
      <div class="profile-top">
        <span>Account <strong id="signedInAcct"></strong></span>
        <button id="logoutBtn" class="btn-ghost">Log out</button>
      </div>

      <div class="id-card">
        <div class="id-card-row">
          <div class="id-chip" aria-hidden="true"></div>
          <div class="signal-mini" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="id-name" id="custName"></div>
        <div class="id-meta">
          <div><span class="meta-label">Customer ID</span><span class="meta-val mono" id="custId"></span></div>
          <div><span class="meta-label">Account No.</span><span class="meta-val mono" id="custAcct"></span></div>
        </div>
      </div>

      <div class="package-row">
        <span class="package-label">Active package</span>
        <span class="package-pill" id="custPackage"></span>
      </div>

      <div class="details-card">
        <div class="details-title">Usage &amp; Billing</div>
        <div id="detailsList"></div>
      </div>

      <button id="emailBillBtn" class="btn-ghost" style="width:100%; margin-top:16px; padding:12px;">Email me my bill</button>
      <p class="hint" id="emailStatus" style="margin-top:8px; margin-bottom:0;" hidden></p>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://iuzwdjgagcxqwtpihpmb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1endkamdhZ2N4cXd0cGlocG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzQ0NzMsImV4cCI6MjA5ODExMDQ3M30.h_ofLT6hKZUsiw3lfZh2qAO62C1BT78k4dSjGXrzAow';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentCustomer = null;
    const KNOWN_FIELDS = ['customer_id', 'customer_name', 'account_number', 'package_detail', 'email'];

    function prettyLabel(key){
      return key
        .replace(/_/g, ' ')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .trim()
        .split(/\s+/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    function formatValue(key, val){
      if (val === '' || val === null || val === undefined) return '—';
      const k = key.toLowerCase();
      const str = String(val).trim();
      const isNumeric = str !== '' && !isNaN(parseFloat(str.replace(/,/g,''))) && /^[\d.,\s]+$/.test(str);

      if (isNumeric && /(amount|bill|balance|due|charge|cost|fee)/.test(k)){
        const num = parseFloat(str.replace(/,/g,''));
        return 'Rs. ' + num.toLocaleString('en-PK');
      }
      if (/(date|expiry|renew)/.test(k)){
        const d = new Date(val);
        if (!isNaN(d.getTime())){
          return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }
      }
      return str;
    }

    const loginView = document.getElementById('loginView');
    const profileView = document.getElementById('profileView');
    const loginForm = document.getElementById('loginForm');
    const accountInput = document.getElementById('accountInput');
    const passwordInput = document.getElementById('passwordInput');
    const togglePass = document.getElementById('togglePass');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const emailBillBtn = document.getElementById('emailBillBtn');
    const emailStatus = document.getElementById('emailStatus');

    function showError(msg){
      loginError.textContent = msg;
      loginError.hidden = false;
    }
    function clearError(){
      loginError.hidden = true;
      loginError.textContent = '';
    }

    loginForm.addEventListener('submit', async function(e){
      e.preventDefault();
      clearError();
      const acctVal = accountInput.value.trim();
      const passVal = passwordInput.value.trim();
      if (!acctVal || !passVal){
        showError('Enter your account number and password.');
        return;
      }
      const submitBtn = loginForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking...';
      try{
        const { data, error } = await supabaseClient.functions.invoke('login', {
          body: { accountNumber: acctVal, password: passVal }
        });
        if (error || !data || data.error || !data.customer){
          showError('Account number or password is incorrect.');
          return;
        }
        renderProfile(data.customer);
      } catch (err){
        showError('Could not reach the server. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'View my account';
      }
    });

    function renderProfile(customer){
      currentCustomer = customer;

      document.getElementById('signedInAcct').textContent = customer.account_number || '—';
      document.getElementById('custName').textContent = customer.customer_name || '—';
      document.getElementById('custId').textContent = customer.customer_id || '—';
      document.getElementById('custAcct').textContent = customer.account_number || '—';
      document.getElementById('custPackage').textContent = customer.package_detail || '—';

      const extraKeys = Object.keys(customer).filter(k => !KNOWN_FIELDS.includes(k));

      const list = document.getElementById('detailsList');
      list.innerHTML = '';

      if (extraKeys.length === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No usage or billing data yet. Add columns to the customers table in Supabase and they will show up here automatically.';
        list.appendChild(empty);
      } else {
        extraKeys.forEach(k => {
          const row = document.createElement('div');
          row.className = 'bill-row';
          row.innerHTML =
            '<span class="bill-label">' + prettyLabel(k) + '</span>' +
            '<span class="bill-leader"></span>' +
            '<span class="bill-value">' + formatValue(k, customer[k]) + '</span>';
          list.appendChild(row);
        });
      }

      loginView.hidden = true;
      profileView.hidden = false;
    }

    logoutBtn.addEventListener('click', function(){
      profileView.hidden = true;
      loginView.hidden = false;
      accountInput.value = '';
      passwordInput.value = '';
      currentCustomer = null;
      emailStatus.hidden = true;
      clearError();
    });

    togglePass.addEventListener('click', function(){
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      togglePass.textContent = isHidden ? 'Hide' : 'Show';
      togglePass.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });

    emailBillBtn.addEventListener('click', async function(){
      if (!currentCustomer) return;
      emailBillBtn.disabled = true;
      emailStatus.hidden = false;
      emailStatus.textContent = 'Sending...';
      try{
        const { data, error } = await supabaseClient.functions.invoke('send-bill-email', {
          body: { accountNumber: currentCustomer.account_number }
        });
        if (error || !data || data.error){
          emailStatus.textContent = 'Could not send the email. Please try again later.';
        } else {
          emailStatus.textContent = 'Sent! Check your inbox.';
        }
      } catch (err){
        emailStatus.textContent = 'Could not send the email. Please try again later.';
      } finally {
        emailBillBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
