<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscriber Account</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            background-color: #111827; /* Dark background */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #9ca3af;
        }

        .header a {
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #374151;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .profile-card {
            background-color: #1f2937;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .sim-icon {
            width: 40px;
            height: 30px;
            background-color: #d4a373;
            border-radius: 6px;
        }

        .signal-icon {
            color: #10b981;
            font-size: 20px;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 22px;
        }

        .info-grid {
            display: flex;
            gap: 30px;
        }

        .label {
            display: block;
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .value {
            font-size: 16px;
            font-weight: 500;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* --- BADGE STYLES --- */
        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .badge.active {
            background-color: #10b981; /* Green/Teal */
            color: white;
        }

        .badge.expired {
            background-color: #ef4444; /* RED */
            color: white;
        }

        .badge.balance {
            background-color: #374151;
            color: white;
        }

        .other-details {
            background-color: #1f2937;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .other-details h3 {
            margin: 0 0 10px 0;
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
        }

        .other-details p {
            margin: 0;
            font-size: 14px;
            color: #d1d5db;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <span>Account <strong id="header-account">03034005269</strong></span>
        <a href="#">Log out</a>
    </div>

    <!-- Profile Card -->
    <div class="profile-card">
        <div class="card-top">
            <div class="sim-icon"></div>
            <div class="signal-icon">📶</div>
        </div>
        <h2 id="customer-name">Muhammd Bilal Rafiq</h2>
        <div class="info-grid">
            <div>
                <span class="label">Customer ID</span>
                <span class="value" id="customer-id">pnmr0152</span>
            </div>
            <div>
                <span class="label">Phone</span>
                <span class="value" id="customer-phone">03034005269</span>
            </div>
        </div>
    </div>

    <!-- Details Section -->
    <div class="detail-row">
        <span class="label">Expires</span>
        <!-- This is the badge that will turn red -->
        <span id="expires-badge" class="badge">Loading...</span>
    </div>

    <div class="detail-row">
        <span class="label">Balance</span>
        <span class="badge balance">--</span>
    </div>

    <div class="other-details">
        <h3>Other Details</h3>
        <p>No other details on file.</p>
    </div>

    <!-- --- JAVASCRIPT LOGIC --- -->
    <script>
        // 1. Get the expiration date from your Supabase data 
        // (Replace this with your actual data variable, e.g., currentCustomer.expiration_date)
        const expirationDateStr = '2026-06-02'; // Change to a past date like '2024-01-01' to test the red color
        
        const expiresBadge = document.getElementById('expires-badge');
        const expDate = new Date(expirationDateStr);
        const today = new Date();
        
        // Reset time to midnight for accurate date-only comparison
        today.setHours(0, 0, 0, 0);
        expDate.setHours(0, 0, 0, 0);

        // 2. Format the date nicely (e.g., "02 Jun 2026")
        const options = { day: '2-digit', month: 'short', year: 'numeric' };
        const formattedDate = expDate.toLocaleDateString('en-GB', options);

        // 3. Check if expired and apply CSS class
        if (expDate < today) {
            // EXPIRED: Add 'expired' class (Red)
            expiresBadge.classList.add('expired');
            expiresBadge.textContent = 'EXPIRED'; // Or use formattedDate if you want to keep the date
        } else {
            // ACTIVE: Add 'active' class (Green)
            expiresBadge.classList.add('active');
            expiresBadge.textContent = formattedDate;
        }
    </script>

</body>
</html>
